# Deploy proprietário Lotus → Cloudflare Workers
# Disparo MANUAL apenas — não substitui Lovable até validação em produção.
# Secrets necessários: CLOUDFLARE_API_TOKEN + variáveis OFFICIAL_* / VITE_OFFICIAL_*

name: Deploy (Cloudflare)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Digite deploy para confirmar"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate engineering system
        run: npm run validate:engineering

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_OFFICIAL_SUPABASE_URL: ${{ secrets.VITE_OFFICIAL_SUPABASE_URL }}
          VITE_OFFICIAL_SUPABASE_ANON_KEY: ${{ secrets.VITE_OFFICIAL_SUPABASE_ANON_KEY }}
          VITE_OFFICIAL_SUPABASE_PROJECT_ID: ${{ secrets.VITE_OFFICIAL_SUPABASE_PROJECT_ID }}
          OFFICIAL_SUPABASE_URL: ${{ secrets.OFFICIAL_SUPABASE_URL }}
          OFFICIAL_SUPABASE_ANON_KEY: ${{ secrets.OFFICIAL_SUPABASE_ANON_KEY }}
          OFFICIAL_SERVICE_ROLE_KEY: ${{ secrets.OFFICIAL_SERVICE_ROLE_KEY }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: .output/server
          command: deploy
