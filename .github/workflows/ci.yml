name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Test · Build · Engineering
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate engineering system
        run: npm run validate:engineering

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_OFFICIAL_SUPABASE_URL: https://placeholder.supabase.co
          VITE_OFFICIAL_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_OFFICIAL_SUPABASE_PROJECT_ID: placeholder
          OFFICIAL_SUPABASE_URL: https://placeholder.supabase.co
          OFFICIAL_SUPABASE_ANON_KEY: placeholder-anon-key
          OFFICIAL_SERVICE_ROLE_KEY: placeholder-service-role-key
